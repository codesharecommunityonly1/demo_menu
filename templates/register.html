<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | DIGITAL 3D MENU</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0a0a0a; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <a href="/" class="flex items-center justify-center gap-3 mb-8">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-orange-500 to-orange-400 flex items-center justify-center text-2xl font-bold font-display">D</div>
            <span class="text-3xl font-bold font-display">DIGITAL <span class="text-orange-500">3D MENU</span></span>
        </a>
        <div class="glass rounded-3xl p-8 border border-orange-500/20">
            <h2 class="text-3xl font-bold font-display text-center mb-2">Create Account</h2>
            <p class="text-gray-400 text-center mb-8">Join thousands of food lovers</p>
            {% if error %}<div class="bg-red-500/20 text-red-400 p-3 rounded-xl mb-4 text-center text-sm">{{ error }}</div>{% endif %}
            <form method="POST" class="space-y-4">
                <input type="text" name="username" placeholder="Full name" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition">
                <input type="email" name="email" placeholder="Email" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition">
                <input type="password" name="password" placeholder="Password (min 6 characters)" required minlength="6" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition">
                <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-orange-500 to-orange-400 font-semibold hover:shadow-lg hover:shadow-orange-500/30 transition">Create Account</button>
            </form>
            <p class="text-center text-gray-400 mt-6">Already have an account? <a href="{{ url_for('login') }}" class="text-orange-500 font-semibold">Sign in</a></p>
        </div>
    </div>
</body>
</html>
